<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SLM Marketplace</title>
  <link rel="canonical" href="https://slm-market.sannan.app/auth">
  <meta property="og:url" content="https://slm-market.sannan.app/auth">
  <meta property="og:image" content="https://slm-market.sannan.app/assets/og-image.svg">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <meta name="description" content="Sign in or create your free SLM Marketplace account to upload models, save favourites, and join the community.">
  <meta name="theme-color" content="#F97316">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sign In — SLM Marketplace">
  <meta property="og:description" content="Discover and share Small Language Models built by the community.">
  <meta property="og:site_name" content="SLM Marketplace">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Sign In — SLM Marketplace">
  <meta name="twitter:description" content="Discover and share Small Language Models built by the community.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Async font load: media=print trick avoids render-blocking -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-brand">
      <a href="index.html" class="auth-logo">
        <span class="logo-mark">SLM</span>
        <span class="logo-text">Marketplace</span>
      </a>
      <p class="auth-tagline">Discover and share Small Language Models</p>
    </div>

    <!-- Tab bar -->
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" data-tab="login"  role="tab" aria-selected="true">Log In</button>
      <button class="auth-tab"         data-tab="signup" role="tab" aria-selected="false">Sign Up</button>
    </div>

    <!-- ===================== LOGIN PANEL ===================== -->
    <div class="auth-panel active" id="panel-login" role="tabpanel">

      <!-- Error banner -->
      <div class="auth-error hidden" id="login-error" role="alert">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span></span>
      </div>

      <!-- GitHub OAuth -->
      <button class="github-oauth-btn" type="button" aria-label="Continue with GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Continue with GitHub
      </button>

      <div class="auth-divider">or continue with email</div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">
            Password
            <a href="#" class="forgot-link">Forgot password?</a>
          </label>
          <div class="pw-wrap">
            <input
              type="password"
              id="login-password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
            <button type="button" class="pw-toggle" data-target="login-password" aria-label="Show password">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn" class="auth-submit-btn">Log In</button>
      </form>

      <div class="auth-switch">
        Don't have an account?
        <button type="button" onclick="switchTab('signup')">Sign up free</button>
      </div>
    </div>

    <!-- ===================== SIGNUP PANEL ===================== -->
    <div class="auth-panel" id="panel-signup" role="tabpanel">

      <!-- Error banner -->
      <div class="auth-error hidden" id="signup-error" role="alert">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span></span>
      </div>

      <!-- GitHub OAuth -->
      <button class="github-oauth-btn" type="button" aria-label="Sign up with GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Sign up with GitHub
      </button>

      <div class="auth-divider">or sign up with email</div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label class="form-label form-label-required" for="signup-name">Full Name</label>
          <input
            type="text"
            id="signup-name"
            class="form-input"
            placeholder="Alex Chen"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label form-label-required" for="signup-email">Email</label>
          <input
            type="email"
            id="signup-email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label form-label-required" for="signup-password">Password</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="signup-password"
              class="form-input"
              placeholder="Min. 8 characters"
              autocomplete="new-password"
              required
            >
            <button type="button" class="pw-toggle" data-target="signup-password" aria-label="Show password">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <!-- Password strength indicator -->
          <div class="pw-strength-wrap">
            <div class="pw-strength-bar-bg">
              <div class="pw-strength-bar" id="pw-strength-bar"></div>
            </div>
            <span class="pw-strength-label" id="pw-strength-label"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label form-label-required" for="signup-confirm">Confirm Password</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="signup-confirm"
              class="form-input"
              placeholder="Re-enter password"
              autocomplete="new-password"
              required
            >
            <button type="button" class="pw-toggle" data-target="signup-confirm" aria-label="Show password">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="signup-btn" class="auth-submit-btn">Create Account</button>
      </form>

      <div class="auth-switch">
        Already have an account?
        <button type="button" onclick="switchTab('login')">Log in</button>
      </div>
    </div>

  </div>
</div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-YEteyAKbjYSLDrpbBY0aFgK1CrQHo0Erb5XT/MU5FYvkb3SmPSZSisW7LOYTKvTx" crossorigin="anonymous"></script>
<script src="js/supabase.js" defer></script>
<script src="js/global.js" defer></script>
<script src="js/auth.js" defer></script>
</body>
</html>
