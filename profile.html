<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineer Profile — SLM Marketplace</title>
  <link rel="canonical" href="https://slm-market.sannan.app/profile">
  <meta property="og:url" content="https://slm-market.sannan.app/profile">
  <meta property="og:image" content="https://slm-market.sannan.app/assets/og-image.svg">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <meta name="description" content="View this engineer's published Small Language Models, reviews, and activity on SLM Marketplace.">
  <meta name="theme-color" content="#F97316">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Engineer Profile — SLM Marketplace">
  <meta property="og:description" content="Discover and share Small Language Models built by the community.">
  <meta property="og:site_name" content="SLM Marketplace">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Engineer Profile — SLM Marketplace">
  <meta name="twitter:description" content="Discover and share Small Language Models built by the community.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Async font load: media=print trick avoids render-blocking -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/profile.css">
  <!-- Reuse model.css for review styles -->
  <link rel="stylesheet" href="css/model.css">
</head>
<body>
<div class="page-wrapper">

  <main class="main-content" id="main-content">
    <div class="profile-wrap">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

      <!-- Profile Top -->
      <div class="profile-top" id="profile-top">
        <!-- Injected by profile.js -->
      </div>

      <!-- Stats -->
      <div class="profile-stats" id="profile-stats">
        <!-- Injected by profile.js -->
      </div>

      <!-- Tabs -->
      <div class="profile-tabs-wrap">
        <div class="tabs-bar" id="profile-tabs" role="tablist">
          <button class="tab-btn active" data-tab="models"   role="tab" aria-selected="true">Models</button>
          <button class="tab-btn"         data-tab="reviews"  role="tab" aria-selected="false">Reviews</button>
          <button class="tab-btn"         data-tab="activity" role="tab" aria-selected="false">Activity</button>
        </div>

        <div id="tab-models"   class="tab-panel active" role="tabpanel"></div>
        <div id="tab-reviews"  class="tab-panel"        role="tabpanel"></div>
        <div id="tab-activity" class="tab-panel"        role="tabpanel"></div>
      </div>

    </div>
  </main>

</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js" defer></script>
<script src="js/global.js" defer></script>
<script src="js/profile.js" defer></script>
</body>
</html>
