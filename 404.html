<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | SLM Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .notfound-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .notfound-code {
      font-size: 96px;
      font-weight: 800;
      color: #F3F4F6;
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 8px;
    }
    .notfound-title {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }
    .notfound-desc {
      font-size: 14px;
      color: #6B7280;
      margin-bottom: 32px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }
    .notfound-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div class="notfound-page">
  <div>
    <div class="notfound-code">404</div>
    <h1 class="notfound-title">Page not found</h1>
    <p class="notfound-desc">The page you're looking for doesn't exist or has been moved.</p>
    <div class="notfound-actions">
      <a href="/" class="btn btn-primary">Go Home</a>
      <a href="/explore.html" class="btn btn-secondary">Explore Models</a>
    </div>
  </div>
</div>
</body>
</html>
