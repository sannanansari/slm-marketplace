<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLM Marketplace — Discover Small Language Models</title>
  <meta name="description" content="Search, explore and share Small Language Models built by the community.">
  <link rel="canonical" href="https://slm-market.sannan.app/">
  <meta property="og:url" content="https://slm-market.sannan.app/">
  <meta property="og:image" content="https://slm-market.sannan.app/assets/og-image.svg">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <meta name="theme-color" content="#F97316">
  <meta property="og:type" content="website">
  <meta property="og:title" content="SLM Marketplace — Discover Small Language Models">
  <meta property="og:description" content="Search, explore and share Small Language Models built by the community.">
  <meta property="og:site_name" content="SLM Marketplace">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="SLM Marketplace — Discover Small Language Models">
  <meta name="twitter:description" content="Search, explore and share Small Language Models built by the community.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Async font load: media=print trick avoids render-blocking -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
<div class="page-wrapper">
  <!-- Header injected by JS -->

  <main class="main-content" id="main-content">
    <!-- Hero -->
    <section class="hero">
      <h1 class="hero-title">Discover <span>Small Language Models</span></h1>
      <p class="hero-subtitle">Search, explore and share SLMs built by the community</p>
      <form id="hero-search-form" class="hero-search" role="search">
        <div class="hero-search-wrap">
          <svg class="hero-search-icon-wrap" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="search"
            id="hero-search-input"
            placeholder="Search models, use cases, tags..."
            autocomplete="off"
            aria-label="Search models"
          >
        </div>
        <button type="submit" class="hero-search-btn">Search</button>
      </form>
    </section>

    <!-- Browse by Category -->
    <section class="categories-section">
      <div class="section-title">Browse by Category</div>
      <div id="category-tabs" class="category-tabs" role="tablist" aria-label="Filter by category">
        <!-- Injected by home.js -->
      </div>
    </section>

    <!-- Recent Models -->
    <section class="recent-section">
      <div class="section-header">
        <span class="section-title">Recent Models</span>
        <a href="explore.html" class="view-all-link">
          View all models
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </a>
      </div>
      <div class="models-list" id="models-list" role="list">
        <!-- Injected by home.js -->
      </div>
    </section>
  </main>

  <!-- Footer injected by JS -->
</div>

<!-- Scripts -->
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js" defer></script>
<script src="js/global.js" defer></script>
<script src="js/home.js" defer></script>
</body>
</html>
